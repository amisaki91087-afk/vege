<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ベジログ - 野菜の生育管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body {
            font-family: 'Noto+Sans+JP', sans-serif;
            background-color: #f0fdf4;
        }
        .card {
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span>🌿</span> ベジログ
            </h1>
            <button onclick="toggleModal('add-modal')" class="bg-white text-green-600 px-4 py-1 rounded-full font-bold text-sm">
                ＋ 追加
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <!-- Dashboard Stats -->
        <div id="stats-container" class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-100 text-center">
                <p class="text-xs text-gray-500">栽培中</p>
                <p id="active-count" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-100 text-center">
                <p class="text-xs text-gray-500">収穫済み</p>
                <p id="harvested-count" class="text-2xl font-bold text-orange-500">0</p>
            </div>
        </div>

        <!-- Veggie List -->
        <div id="veggie-list" class="space-y-4">
            <!-- Items will be injected here -->
            <div id="empty-state" class="text-center py-20 text-gray-400">
                <p>まだ登録されている野菜がありません。</p>
                <p class="text-sm">右上の「追加」から始めましょう！</p>
            </div>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-3xl w-full max-w-md p-6">
            <h2 class="text-xl font-bold mb-4">新しい野菜を登録</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">野菜の名前</label>
                    <input type="text" id="veg-name" placeholder="例: トマト、ナス" class="w-full border rounded-xl px-4 py-2 outline-none focus:border-green-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">種まき日</label>
                        <input type="date" id="plant-date" class="w-full border rounded-xl px-4 py-2 outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">収穫予定日</label>
                        <input type="date" id="harvest-date" class="w-full border rounded-xl px-4 py-2 outline-none focus:border-green-500">
                    </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="toggleModal('add-modal')" class="flex-1 py-3 text-gray-500 font-bold">キャンセル</button>
                    <button onclick="saveVeggie()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold">登録する</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Templates -->
    <script>
        let veggies = JSON.parse(localStorage.getItem('veggies') || '[]');

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                // Set default dates
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('plant-date').value = today;
            }
        }

        function saveVeggie() {
            const name = document.getElementById('veg-name').value;
            const plantDate = document.getElementById('plant-date').value;
            const harvestDate = document.getElementById('harvest-date').value;

            if(!name || !plantDate) {
                showMessage("名前と日付を入力してください");
                return;
            }

            const newVeg = {
                id: Date.now(),
                name,
                plantDate,
                harvestDate,
                logs: [],
                status: 'growing'
            };

            veggies.push(newVeg);
            updateStorage();
            renderList();
            toggleModal('add-modal');
            
            // Clear inputs
            document.getElementById('veg-name').value = '';
        }

        function updateStorage() {
            localStorage.setItem('veggies', JSON.stringify(veggies));
            updateStats();
        }

        function updateStats() {
            document.getElementById('active-count').textContent = veggies.filter(v => v.status === 'growing').length;
            document.getElementById('harvested-count').textContent = veggies.filter(v => v.status === 'harvested').length;
        }

        function deleteVeggie(id) {
            veggies = veggies.filter(v => v.id !== id);
            updateStorage();
            renderList();
        }

        function markHarvested(id) {
            const veg = veggies.find(v => v.id === id);
            if(veg) {
                veg.status = veg.status === 'harvested' ? 'growing' : 'harvested';
                updateStorage();
                renderList();
            }
        }

        function calculateDays(dateStr) {
            if(!dateStr) return null;
            const target = new Date(dateStr);
            const today = new Date();
            const diff = target - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function renderList() {
            const container = document.getElementById('veggie-list');
            const emptyState = document.getElementById('empty-state');
            
            if(veggies.length === 0) {
                emptyState.classList.remove('hidden');
                container.innerHTML = '';
                container.appendChild(emptyState);
                return;
            } else {
                emptyState.classList.add('hidden');
                container.innerHTML = '';
            }

            // Sort: Active first
            const sorted = [...veggies].sort((a, b) => (a.status === 'harvested' ? 1 : -1));

            sorted.forEach(veg => {
                const daysLeft = calculateDays(veg.harvestDate);
                const isHarvested = veg.status === 'harvested';
                
                const card = document.createElement('div');
                card.className = `card bg-white p-5 rounded-3xl shadow-sm border ${isHarvested ? 'border-gray-200 opacity-75' : 'border-green-100'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-bold ${isHarvested ? 'text-gray-500 line-through' : 'text-gray-800'}">${veg.name}</h3>
                            <p class="text-xs text-gray-400">種まき: ${veg.plantDate}</p>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="markHarvested(${veg.id})" class="p-2 rounded-full ${isHarvested ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">
                                ${isHarvested ? '✔' : '収穫'}
                            </button>
                            <button onclick="deleteVeggie(${veg.id})" class="p-2 text-gray-300 hover:text-red-500">
                                🗑
                            </button>
                        </div>
                    </div>
                    
                    ${!isHarvested && daysLeft !== null ? `
                        <div class="bg-green-50 rounded-2xl p-3 flex justify-between items-center">
                            <span class="text-sm text-green-700 font-medium">収穫まであと</span>
                            <span class="text-xl font-bold text-green-600">${daysLeft > 0 ? daysLeft : 0}日</span>
                        </div>
                    ` : isHarvested ? `
                        <div class="bg-orange-50 rounded-2xl p-3 text-center">
                            <span class="text-sm text-orange-700 font-medium font-bold">🎉 収穫おめでとう！</span>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        function showMessage(msg) {
            // Simple replacement for alert
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm z-[100]";
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Init
        window.onload = () => {
            renderList();
            updateStats();
        };
    </script>
</body>
</html>
